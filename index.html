<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>과일 짝맞추기 게임</title>
  <link rel="icon" type="image/svg+xml" href="./assets/images/favicon.svg">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
  <main class="app">
    <div class="scene-glow scene-glow-left" aria-hidden="true"></div>
    <div class="scene-glow scene-glow-right" aria-hidden="true"></div>

    <section class="panel">
      <div class="panel-copy">
        <p class="eyebrow">Memory Puzzle</p>
        <h1>과일 짝맞추기</h1>
        <p class="description">
          난이도를 고르고 제한시간 안에 같은 과일 카드 쌍을 모두 찾아 보드를 완성해 보세요.
        </p>
      </div>

      <section class="difficulty-panel" aria-labelledby="difficultyTitle">
        <div class="difficulty-heading">
          <p id="difficultyTitle" class="difficulty-title">난이도 선택</p>
          <p id="difficultySummary" class="difficulty-summary">쉬움 · 4x4 · 04:00</p>
        </div>
        <div class="difficulty-options" role="group" aria-labelledby="difficultyTitle">
          <button class="difficulty-button is-active" type="button" data-difficulty="easy">쉬움</button>
          <button class="difficulty-button" type="button" data-difficulty="medium">보통</button>
          <button class="difficulty-button" type="button" data-difficulty="hard">어려움</button>
        </div>
      </section>

      <div class="status-board">
        <div class="status-card">
          <span class="status-label">시도 횟수</span>
          <strong id="attempts">0</strong>
        </div>
        <div class="status-card">
          <span class="status-label">남은 시간</span>
          <strong id="elapsedTime">04:00</strong>
        </div>
        <div class="status-card">
          <span class="status-label">정확도</span>
          <strong id="accuracy">0%</strong>
        </div>
      </div>

      <div class="actions">
        <button id="restartButton" type="button">새 게임 시작</button>
      </div>

      <p id="message" class="message" aria-live="polite">
        난이도를 고른 뒤 카드를 눌러 게임을 시작해 보세요.
      </p>
    </section>

    <section class="game-area" aria-label="과일 짝맞추기 보드">
      <div class="board-shell">
        <div class="board-meta">
          <p class="board-title">Memory Board</p>
          <p id="boardSubtitle" class="board-subtitle">쉬움 난이도에서 4x4 보드를 4분 안에 클리어하세요.</p>
        </div>
        <div
          id="gameBoard"
          class="game-board"
          role="grid"
          aria-label="4x4 과일 짝맞추기 보드"
        ></div>
      </div>
    </section>
  </main>

  <script src="./js/utils.js"></script>
  <script src="./js/board.js"></script>
  <script src="./js/game.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
